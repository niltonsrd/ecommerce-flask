{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin/editar-produto.css') }}">
{% endblock %}

{% block content %}

<section class="admin-shell">
    <div class="admin-page-header">
        <div>
            <span class="section-kicker">Admin</span>
            <h1>Editar Produto</h1>
            <p>Atualize as informações do produto, categoria, marca, preço e status de exibição.</p>
        </div>

        <div class="admin-toolbar">
            <a href="/admin/produtos" class="btn-admin-outline">Voltar</a>
        </div>
    </div>

    <section class="admin-form-panel">
        <form method="POST" class="admin-form">
            <div class="admin-form-grid">
                <div class="admin-form-group admin-form-group-full">
                    <label for="nome">Nome do produto</label>
                    <input type="text" id="nome" name="nome" value="{{ produto[1] }}"
                        placeholder="Digite o nome do produto" required>
                </div>

                <div class="admin-form-group admin-form-group-full">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" name="descricao" rows="6"
                        placeholder="Descreva o produto, materiais, diferenciais, estilo, acabamento...">{{ produto[2] }}</textarea>
                </div>

                <div class="admin-form-group">
                    <label for="preco">Preço</label>
                    <input type="number" id="preco" name="preco" step="0.01" min="0" value="{{ produto[3] }}" required>
                </div>

                <div class="admin-form-group">
                    <label for="categoria">Categoria</label>
                    <select id="categoria" name="categoria" required>
                        {% for categoria in categorias %}
                        <option value="{{ categoria[0] }}" {% if produto[4]==categoria[0] %}selected{% endif %}>
                            {{ categoria[1] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="admin-form-group">
                    <label for="marca">Marca</label>
                    <select id="marca" name="marca" required>
                        {% for marca in marcas %}
                        <option value="{{ marca[0] }}" {% if produto[5]==marca[0] %}selected{% endif %}>
                            {{ marca[1] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="admin-form-group">
                    <label for="ativo">Status</label>
                    <select id="ativo" name="ativo" required>
                        <option value="true" {% if produto[6] %}selected{% endif %}>Ativo</option>
                        <option value="false" {% if not produto[6] %}selected{% endif %}>Inativo</option>
                    </select>
                </div>
            </div>

            <div class="admin-form-actions">
                <a href="/admin/produtos" class="btn-admin-danger">Cancelar</a>
                <button type="submit" class="btn-admin">Atualizar Produto</button>
            </div>
        </form>
    </section>
</section>

{% endblock %}
